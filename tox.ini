[tox]
envlist = py312
isolated_build = True
parallel = True

[testenv]
deps =
    pytest>=8.2.2,<10.0.0
    pytest-cov>=5,<8
    pytest-asyncio>=0.23.7,<1.4.0
    pytest-timeout>=2.3.1,<3.0.0
commands =
    pytest -s -v --cov=pyscenario --timeout=10 {posargs} tests

[gh-actions]
python =
    3.12: py312
